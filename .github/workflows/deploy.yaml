name: Deploy
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  TOML_PATH: "/pyproject.toml"

on:
  push:
    branches:
      - dev

jobs:
  doc:
    name: Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install the latest version of uv and set the python version
        uses: astral-sh/setup-uv@v5
        with:
          pyproject-file: ${{ env.TOML_PATH }}
      - name: Install dependencies
        run: uv lock --frozen
      - name: Set Reflex to production mode
        run: echo "REFLEX_ENV_MODE=prod" >> $GITHUB_ENV
      - name: Build reflex page
        run: uv run reflex export --frontend-only --no-zip
      - name: Create Vercel config for static deploy
        run: |
          cat << 'EOF' > .web/build/client/vercel.json
          {
            "framework": null,
            "builds": [
              {
                "src": "**/*",
                "use": "@vercel/static"
              }
            ],
            "routes": [
              {
                "src": "/(.*)",
                "dest": "/_spa-fallback.html"
              }
            ]
          }
          EOF
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Upload to Vercel
        run: |
          cd .web/build/client/
          ls -la .
          vercel --prod --yes --token $VERCEL_TOKEN